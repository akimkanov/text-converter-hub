<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Converter Hub</title>
<style>
  /* ============ RESET & BASE ============ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root{
    --bg-1: #0a0a17;
    --bg-2: #120b29;
    --accent-1: #7c5cff;
    --accent-2: #3ad6ff;
    --accent-3: #ff4dd8;
    --glass-bg: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.12);
    --text-main: #f1f0ff;
    --text-dim: #9d9ac0;
    --radius: 18px;
    --shadow-glow: 0 0 40px rgba(124,92,255,0.25);
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-main);
    background:
      radial-gradient(circle at 15% 15%, rgba(124,92,255,0.25), transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(58,214,255,0.18), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(255,77,216,0.15), transparent 45%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2) 70%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Ambient floating orbs for depth */
  body::before, body::after{
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    z-index: 0;
    pointer-events: none;
    opacity: 0.35;
  }
  body::before{
    background: var(--accent-1);
    top: -150px;
    left: -150px;
    animation: floatOrb 14s ease-in-out infinite;
  }
  body::after{
    background: var(--accent-2);
    bottom: -150px;
    right: -150px;
    animation: floatOrb 18s ease-in-out infinite reverse;
  }
  @keyframes floatOrb{
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(40px, 30px) scale(1.1); }
  }

  .wrapper{
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 24px 100px;
  }

  /* ============ SCROLLBAR ============ */
  ::-webkit-scrollbar{ width: 10px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{
    background: linear-gradient(var(--accent-1), var(--accent-2));
    border-radius: 10px;
  }

  /* ============ HEADER ============ */
  header{
    text-align: center;
    margin-bottom: 48px;
    animation: fadeInDown 0.8s ease both;
  }

  .logo-badge{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 78px;
    height: 78px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
    box-shadow: 0 0 45px rgba(124,92,255,0.55), inset 0 0 20px rgba(255,255,255,0.2);
    font-size: 34px;
    margin-bottom: 20px;
    animation: pulseGlow 3.5s ease-in-out infinite;
  }

  @keyframes pulseGlow{
    0%, 100% { box-shadow: 0 0 35px rgba(124,92,255,0.45), inset 0 0 20px rgba(255,255,255,0.15); }
    50% { box-shadow: 0 0 60px rgba(58,214,255,0.55), inset 0 0 25px rgba(255,255,255,0.25); }
  }

  h1{
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(100deg, #ffffff 10%, var(--accent-2) 45%, var(--accent-3) 80%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
  }

  header p{
    color: var(--text-dim);
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    font-weight: 400;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ============ GLASS PANEL BASE ============ */
  .glass{
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }

  /* ============ INPUT SECTION ============ */
  .input-section{
    padding: 28px;
    margin-bottom: 36px;
    animation: fadeInUp 0.8s ease 0.1s both;
  }

  .section-label{
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent-2);
    font-weight: 600;
    margin-bottom: 14px;
  }

  .section-label .dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-2);
    box-shadow: 0 0 10px var(--accent-2);
  }

  textarea{
    width: 100%;
    min-height: 140px;
    resize: vertical;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px;
    color: var(--text-main);
    font-size: 1.05rem;
    font-family: inherit;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
  }

  textarea::placeholder{ color: var(--text-dim); }

  textarea:focus{
    border-color: var(--accent-1);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 4px rgba(124,92,255,0.18), 0 0 30px rgba(124,92,255,0.15);
  }

  .input-actions{
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 16px;
  }

  /* ============ BUTTONS ============ */
  button{
    font-family: inherit;
    cursor: pointer;
    border: none;
    outline: none;
  }

  .btn{
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.95rem;
    transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
  }

  .btn:active{ transform: scale(0.96); }

  .btn-ghost{
    background: rgba(255,255,255,0.06);
    color: var(--text-main);
    border: 1px solid rgba(255,255,255,0.14);
  }
  .btn-ghost:hover{
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }

  .btn-primary{
    background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
    color: #fff;
    box-shadow: 0 6px 24px rgba(124,92,255,0.4);
  }
  .btn-primary:hover{
    filter: brightness(1.12);
    box-shadow: 0 8px 32px rgba(124,92,255,0.6);
    transform: translateY(-2px);
  }

  /* Ripple effect */
  .btn .ripple{
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out;
    pointer-events: none;
  }
  @keyframes rippleAnim{
    to{ transform: scale(3); opacity: 0; }
  }

  /* ============ GRID SECTION ============ */
  .grid-section{
    margin-bottom: 36px;
    animation: fadeInUp 0.8s ease 0.2s both;
  }

  .search-box{
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 12px 18px;
    margin-bottom: 20px;
    transition: border-color 0.3s ease;
  }
  .search-box:focus-within{
    border-color: var(--accent-2);
    box-shadow: 0 0 20px rgba(58,214,255,0.15);
  }
  .search-box input{
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-main);
    font-size: 0.95rem;
    font-family: inherit;
  }
  .search-box input::placeholder{ color: var(--text-dim); }
  .search-box svg{ flex-shrink: 0; opacity: 0.6; }

  .cards-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  .card{
    position: relative;
    overflow: hidden;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 18px 14px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    animation: fadeInUp 0.5s ease both;
    user-select: none;
  }

  .card::before{
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,92,255,0.25), rgba(58,214,255,0.15));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .card:hover{
    transform: translateY(-4px) scale(1.02);
    border-color: rgba(124,92,255,0.5);
    box-shadow: 0 10px 30px rgba(124,92,255,0.25);
  }
  .card:hover::before{ opacity: 1; }

  .card.active{
    border-color: var(--accent-2);
    background: linear-gradient(135deg, rgba(124,92,255,0.28), rgba(58,214,255,0.18));
    box-shadow: 0 0 0 2px rgba(58,214,255,0.4), 0 10px 34px rgba(58,214,255,0.3);
  }

  .card span{
    position: relative;
    z-index: 1;
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  /* ============ RESULT SECTION ============ */
  .result-section{
    padding: 28px;
    animation: fadeInUp 0.8s ease 0.3s both;
  }

  .result-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
  }

  .result-title{
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .result-title .badge{
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    color: #fff;
  }

  .result-box{
    width: 100%;
    min-height: 140px;
    max-height: 320px;
    overflow-y: auto;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 20px;
    font-size: 1.15rem;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
    transition: box-shadow 0.3s ease;
  }

  .result-box.empty{
    color: var(--text-dim);
    font-size: 0.98rem;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .result-box.glow-update{
    animation: resultGlow 0.6s ease;
  }
  @keyframes resultGlow{
    0%{ box-shadow: 0 0 0 rgba(58,214,255,0); }
    40%{ box-shadow: 0 0 35px rgba(58,214,255,0.35); }
    100%{ box-shadow: 0 0 0 rgba(58,214,255,0); }
  }

  .copy-row{
    display: flex;
    justify-content: flex-end;
    margin-top: 18px;
  }

  .btn-copy{
    min-width: 160px;
    justify-content: center;
  }

  .btn-copy.copied{
    background: linear-gradient(135deg, #2fe6a0, #3ad6ff);
    box-shadow: 0 6px 24px rgba(47,230,160,0.4);
  }

  /* ============ ANIMATIONS ============ */
  @keyframes fadeInDown{
    from{ opacity: 0; transform: translateY(-20px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp{
    from{ opacity: 0; transform: translateY(20px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn{
    from{ opacity: 0; }
    to{ opacity: 1; }
  }

  footer{
    text-align: center;
    margin-top: 60px;
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 768px){
    .wrapper{ padding: 32px 16px 80px; }
    .cards-grid{ grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .card{ padding: 14px 10px; }
    .card span{ font-size: 0.82rem; }
    .input-actions{ justify-content: stretch; }
    .input-actions .btn{ flex: 1; justify-content: center; }
    .result-header{ flex-direction: column; align-items: flex-start; }
    .copy-row{ justify-content: stretch; }
    .btn-copy{ width: 100%; }
  }

  @media (max-width: 420px){
    .cards-grid{ grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .logo-badge{ width: 64px; height: 64px; font-size: 28px; border-radius: 18px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>

<div class="wrapper">

  <!-- ============ HEADER ============ -->
  <header>
    <div class="logo-badge">рҹ”®</div>
    <h1>Text Converter Hub</h1>

  </header>

  <!-- ============ INPUT SECTION ============ -->
  <section class="input-section glass">
    <div class="section-label"><span class="dot"></span>Your Text</div>
    <textarea id="inputText" placeholder="Type or paste your text..." autofocus></textarea>
    <div class="input-actions">
      <button class="btn btn-ghost" id="clearBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Clear
      </button>
    </div>
  </section>

  <!-- ============ GRID SECTION ============ -->
  <section class="grid-section">
    <div class="section-label"><span class="dot"></span>Choose a Conversion</div>
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchBox" placeholder="Search conversions...">

    <div class="result-box empty" id="resultBox">Select a conversion above to see the magic happen вңЁ</div>
    <div class="copy-row">
      <button class="btn btn-primary btn-copy" id="copyBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" id="copyIcon"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="copyLabel">Copy</span>
      </button>
    </div>
  </section>

  <footer>Made with glassmorphism, gradients &amp; pure vanilla JS вҖ” 100% offline.</footer>

</div>

<script>
(function(){
  "use strict";

  /* =========================================================
     HELPER: build a lookup map from a "normal" string and a
     "target" string of equal length (character by character).
  ========================================================= */
  function buildMap(fromStr, toArr){
    const map = {};
    const fromArr = Array.from(fromStr);
    for (let i = 0; i < fromArr.length; i++){
      map[fromArr[i]] = toArr[i];
    }
    return map;
  }

  function mapText(text, map, fallbackFn){
    return Array.from(text).map(ch => {
      if (Object.prototype.hasOwnProperty.call(map, ch)) return map[ch];
      return fallbackFn ? fallbackFn(ch) : ch;
    }).join('');
  }

  const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const LOWER = "abcdefghijklmnopqrstuvwxyz";
  const DIGITS = "0123456789";

  /* =========================================================
     UNICODE FANCY ALPHABETS (character tables)
  ========================================================= */
  const TABLES = {
    bold: {
      up: Array.from("рқҗҖрқҗҒрқҗӮрқҗғрқҗ„рқҗ…рқҗҶрқҗҮрқҗҲрқҗүрқҗҠрқҗӢрқҗҢрқҗҚрқҗҺрқҗҸрқҗҗрқҗ‘рқҗ’рқҗ“рқҗ”рқҗ•рқҗ–рқҗ—рқҗҳрқҗҷ"),
      low: Array.from("рқҗҡрқҗӣрқҗңрқҗқрқҗһрқҗҹрқҗ рқҗЎрқҗўрқҗЈрқҗӨрқҗҘрқҗҰрқҗ§рқҗЁрқҗ©рқҗӘрқҗ«рқҗ¬рқҗӯрқҗ®рқҗҜрқҗ°рқҗұрқҗІрқҗі"),
      dig: Array.from("рқҹҺрқҹҸрқҹҗрқҹ‘рқҹ’рқҹ“рқҹ”рқҹ•рқҹ–рқҹ—")
    },
    italic: {
      up: Array.from("рқҗҙрқҗөрқҗ¶рқҗ·рқҗёрқҗ№рқҗәрқҗ»рқҗјрқҗҪрқҗҫрқҗҝрқ‘Җрқ‘Ғрқ‘Ӯрқ‘ғрқ‘„рқ‘…рқ‘Ҷрқ‘Үрқ‘Ҳрқ‘үрқ‘Ҡрқ‘Ӣрқ‘Ңрқ‘Қ"),
      low: Array.from("рқ‘Һрқ‘Ҹрқ‘җрқ‘‘рқ‘’рқ‘“рқ‘”в„Һрқ‘–рқ‘—рқ‘ҳрқ‘ҷрқ‘ҡрқ‘ӣрқ‘ңрқ‘қрқ‘һрқ‘ҹрқ‘ рқ‘Ўрқ‘ўрқ‘Јрқ‘Өрқ‘Ҙрқ‘Ұрқ‘§"),
      dig: Array.from(DIGITS)
    },
    script: {
      up: Array.from("рқ’ңв„¬рқ’һрқ’ҹв„°в„ұрқ’ўв„Ӣв„җрқ’Ҙрқ’Ұв„’в„ірқ’©рқ’Әрқ’«рқ’¬в„ӣрқ’®рқ’Ҝрқ’°рқ’ұрқ’Ірқ’ірқ’ҙрқ’ө"),
      low: Array.from("рқ’¶рқ’·рқ’ёрқ’№в„Ҝрқ’»в„Ҡрқ’Ҫрқ’ҫрқ’ҝрқ“Җрқ“Ғрқ“Ӯрқ“ғв„ҙрқ“…рқ“Ҷрқ“Үрқ“Ҳрқ“үрқ“Ҡрқ“Ӣрқ“Ңрқ“Қрқ“Һрқ“Ҹ"),
      dig: Array.from(DIGITS)
    },
    doublestruck: {
      up: Array.from("рқ”ёрқ”№в„Ӯрқ”»рқ”јрқ”Ҫрқ”ҫв„Қрқ•Җрқ•Ғрқ•Ӯрқ•ғрқ•„в„•рқ•Ҷв„ҷв„ҡв„қрқ•Ҡрқ•Ӣрқ•Ңрқ•Қрқ•Һрқ•Ҹрқ•җв„Ө"),
      low: Array.from("рқ•’рқ•“рқ•”рқ••рқ•–рқ•—рқ•ҳрқ•ҷрқ•ҡрқ•ӣрқ•ңрқ•қрқ•һрқ•ҹрқ• рқ•Ўрқ•ўрқ•Јрқ•Өрқ•Ҙрқ•Ұрқ•§рқ•Ёрқ•©рқ•Әрқ•«"),
      dig: Array.from("рқҹҳрқҹҷрқҹҡрқҹӣрқҹңрқҹқрқҹһрқҹҹрқҹ рқҹЎ")
    },
    fraktur: {
      up: Array.from("рқ”„рқ”…в„ӯрқ”Үрқ”Ҳрқ”үрқ”Ҡв„Ңв„‘рқ”Қрқ”Һрқ”Ҹрқ”җрқ”‘рқ”’рқ”“рқ””в„ңрқ”–рқ”—рқ”ҳрқ”ҷрқ”ҡрқ”ӣрқ”ңв„Ё"),
      low: Array.from("рқ”һрқ”ҹрқ” рқ”Ўрқ”ўрқ”Јрқ”Өрқ”Ҙрқ”Ұрқ”§рқ”Ёрқ”©рқ”Әрқ”«рқ”¬рқ”ӯрқ”®рқ”Ҝрқ”°рқ”ұрқ”Ірқ”ірқ”ҙрқ”өрқ”¶рқ”·"),
      dig: Array.from(DIGITS)
    },
    bubble: {

    for (let i = 0; i < DIGITS.length; i++) map[DIGITS[i]] = table.dig[i];
    return map;
  }

    return mapText(text, map);

  function randPick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

  function toZalgo(text){
    return Array.from(text).map(ch => {
      if (ch === ' ' || ch === '\\n') return ch;
      let out = ch;
      const upCount = 1 + Math.floor(Math.random() * 3);
      const downCount = 1 + Math.floor(Math.random() * 3);
      const midCount = Math.floor(Math.random() * 2);
      for (let i = 0; i < upCount; i++) out += randPick(ZALGO_UP);
      for (let i = 0; i < downCount; i++) out += randPick(ZALGO_DOWN);
      for (let i = 0; i < midCount; i++) out += randPick(ZALGO_MID);

    }).join('');

  /* =========================================================

  ========================================================= */
  function toBinary(text){
    return Array.from(text).map(ch => ch.codePointAt(0).toString(2).padStart(8, '0')).join(' ');
  }
  function toHex(text){
    return Array.from(text).map(ch => ch.codePointAt(0).toString(16).padStart(2, '0')).join(' ');
  }
  function toAsciiCodes(text){
    return Array.from(text).map(ch => ch.codePointAt(0)).join(' ');

    return Array.from(text).map(ch => 'U+' + ch.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')).join(' ');
  }
  function toHtmlEntities(text){
    return Array.from(text).map(ch => '&#' + ch.codePointAt(0) + ';').join('');
  }

  /* =========================================================
     BASE64 (Unicode-safe)
  ========================================================= */
  function toBase64(text){
    try {
      const bytes = new TextEncoder().encode(text);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary);
    } catch (e){
      return 'Encoding error';
    }
  }

  }

  /* =========================================================

  ========================================================= */
  function shiftChar(ch, shift){
    if (ch >= 'a' && ch <= 'z') return String.fromCharCode((ch.charCodeAt(0) - 97 + shift + 26) % 26 + 97);
    if (ch >= 'A' && ch <= 'Z') return String.fromCharCode((ch.charCodeAt(0) - 65 + shift + 26) % 26 + 65);
    return ch;
  }
  function toRot13(text){
    return Array.from(text).map(ch => shiftChar(ch, 13)).join('');
  }
  function toCaesar(text){
    return Array.from(text).map(ch => shiftChar(ch, 3)).join('');
  }
  function toAtbash(text){
    return Array.from(text).map(ch => {
      if (ch >= 'a' && ch <= 'z') return String.fromCharCode(97 + (25 - (ch.charCodeAt(0) - 97)));
      if (ch >= 'A' && ch <= 'Z') return String.fromCharCode(65 + (25 - (ch.charCodeAt(0) - 65)));
      return ch;
    }).join('');
  }

  /* =========================================================
     EMOJI TEXT (regional indicator style letters + keycap digits)
  ========================================================= */
  function toEmojiText(text){
    return Array.from(text).map(ch => {
      const lower = ch.toLowerCase();
      if (lower >= 'a' && lower <= 'z'){
        const codePoint = 0x1F1E6 + (lower.charCodeAt(0) - 97);
        return String.fromCodePoint(codePoint);
      }
      if (ch >= '0' && ch <= '9'){
        return ch + '\u20E3'; // combining keycap
      }
      if (ch === ' ') return '  ';
      return ch;
    }).join(' ');
  }

  /* =========================================================

  ========================================================= */
  function toRailFence(text, rails){
    rails = rails || 3;
    if (rails < 2) return text;
    const fence = Array.from({length: rails}, () => []);
    let rail = 0, dir = 1;
    for (const ch of text){
      fence[rail].push(ch);
      if (rail === 0) dir = 1;
      else if (rail === rails - 1) dir = -1;
      rail += dir;
    }
    return fence.map(row => row.join('')).join('');
  }

    { id: 'braille', label: 'Braille', fn: toBraille },
    { id: 'runes', label: 'Runes', fn: toRunes },
    { id: 'orkhon', label: 'Orkhon Runes', fn: toOrkhon },
    { id: 'emoji', label: 'Emoji Text', fn: toEmojiText },
    { id: 'ascii', label: 'ASCII', fn: toAsciiCodes },
    { id: 'unicode', label: 'Unicode', fn: toUnicodeCodes },
    { id: 'htmlentities', label: 'HTML Entities', fn: toHtmlEntities },
    { id: 'urlencode', label: 'URL Encode', fn: toUrlEncode },
    { id: 'urldecode', label: 'URL Decode', fn: toUrlDecode },
    { id: 'atbash', label: 'Atbash', fn: toAtbash },
    { id: 'railfence', label: 'Rail Fence', fn: t => toRailFence(t, 3) },
    { id: 'bacon', label: 'Bacon Cipher', fn: toBacon },
    { id: 'pigpen', label: 'Pigpen', fn: toPigpen }
  ];

  /* =========================================================
     DOM REFERENCES
  ========================================================= */
  const inputText = document.getElementById('inputText');
  const cardsGrid = document.getElementById('cardsGrid');
  const searchBox = document.getElementById('searchBox');
  const resultBox = document.getElementById('resultBox');
  const activeBadge = document.getElementById('activeBadge');
  const clearBtn = document.getElementById('clearBtn');
  const copyBtn = document.getElementById('copyBtn');
  const copyLabel = document.getElementById('copyLabel');
  const copyIcon = document.getElementById('copyIcon');

  let activeConverterId = null;

  /* =========================================================
     RENDER CARDS
  ========================================================= */
  function renderCards(filter){
    const term = (filter || '').trim().toLowerCase();
    cardsGrid.innerHTML = '';
    CONVERTERS.forEach((conv, index) => {
      if (term && !conv.label.toLowerCase().includes(term)) return;
      const card = document.createElement('div');
      card.className = 'card' + (conv.id === activeConverterId ? ' active' : '');
      card.style.animationDelay = (index * 0.02) + 's';
      card.dataset.id = conv.id;
      const span = document.createElement('span');
      span.textContent = conv.label;
      card.appendChild(span);
      card.addEventListener('click', function(e){
        createRipple(e, card);
        selectConverter(conv.id);
      });
      cardsGrid.appendChild(card);
    });
  }

  /* =========================================================
     RIPPLE EFFECT
  ========================================================= */
  function createRipple(e, el){
    const circle = document.createElement('span');
    const rect = el.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    circle.style.width = circle.style.height = size + 'px';
    circle.style.left = (e.clientX - rect.left - size / 2) + 'px';
    circle.style.top = (e.clientY - rect.top - size / 2) + 'px';
    circle.classList.add('ripple');
    el.appendChild(circle);
    setTimeout(() => circle.remove(), 650);
  }

  /* =========================================================
     SELECT CONVERTER & UPDATE RESULT
  ========================================================= */
  function selectConverter(id){
    activeConverterId = id;
    document.querySelectorAll('.card').forEach(c => {
      c.classList.toggle('active', c.dataset.id === id);
    });
    updateResult();
  }

  function updateResult(){
    if (!activeConverterId){
      resultBox.classList.add('empty');
      resultBox.textContent = 'Select a conversion above to see the magic happen вңЁ';
      activeBadge.textContent = 'None Selected';
      return;
    }
    const conv = CONVERTERS.find(c => c.id === activeConverterId);
    const raw = inputText.value;
    activeBadge.textContent = conv.label;

    if (!raw){
      resultBox.classList.add('empty');
      resultBox.textContent = 'Start typing above to convert your text into ' + conv.label + '...';
      return;
    }

    let output;
    try {
      output = conv.fn(raw);
    } catch (err){
      output = 'Conversion error: ' + err.message;
    }

    resultBox.classList.remove('empty');
    resultBox.textContent = output;
    resultBox.classList.remove('glow-update');
    void resultBox.offsetWidth; // restart animation
    resultBox.classList.add('glow-update');
  }

  /* =========================================================
     EVENT LISTENERS
  ========================================================= */
  inputText.addEventListener('input', updateResult);

  searchBox.addEventListener('input', () => renderCards(searchBox.value));

  clearBtn.addEventListener('click', function(e){
    createRipple(e, clearBtn);
    inputText.value = '';
    updateResult();
    inputText.focus();
  });

  copyBtn.addEventListener('click', function(e){
    createRipple(e, copyBtn);
    const text = resultBox.classList.contains('empty') ? '' : resultBox.textContent;
    if (!text) return;

    const finishCopy = () => {
      copyBtn.classList.add('copied');
      copyLabel.textContent = 'Copied!';
      copyIcon.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyLabel.textContent = 'Copy';
        copyIcon.innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>';
      }, 2000);
    };

    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(finishCopy).catch(() => {
        fallbackCopy(text);
        finishCopy();
      });
    } else {
      fallbackCopy(text);
      finishCopy();
    }
  });

  function fallbackCopy(text){
    const tempArea = document.createElement('textarea');
    tempArea.value = text;
    tempArea.style.position = 'fixed';
    tempArea.style.opacity = '0';
    document.body.appendChild(tempArea);
    tempArea.select();
    try { document.execCommand('copy'); } catch (e) { /* ignore */ }
    document.body.removeChild(tempArea);
  }

  /* =========================================================
     INIT
  ========================================================= */
  renderCards();
  updateResult();

})();
</script>
</body>
</html>
